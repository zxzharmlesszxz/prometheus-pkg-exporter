---

name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_PLATFORMS: "linux/amd64 linux/arm64"
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"

permissions:
  contents: read

jobs:
  go-check:
    name: Go Check
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine

    steps:
      - name: Prepare Alpine
        run: apk add --no-cache bash build-base ca-certificates git make

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run Go Checks
        run: make go-check

  build:
    name: Build Binary
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine
    needs:
      - go-check

    steps:
      - name: Prepare Alpine
        run: apk add --no-cache bash ca-certificates git make

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build
        run: make build

  docker-check:
    name: Docker And Examples Check
    runs-on: ubuntu-24.04
    needs:
      - go-check

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Examples Check
        run: make examples-check

      - name: Docker Smoke
        run: make docker-smoke

  release:
    name: Release Artifacts
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'
    needs:
      - go-check
      - docker-check
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Build Release Archives
        run: make release-smoke

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          working_directory: dist
          files: |
            *.tar.gz
            checksums.txt

  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'
    needs:
      - go-check
      - docker-check
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
